[package]
name = "tracedb-sdk"
edition = "2021"
license = "Apache-2.0"
version = "0.1.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json", "blocking"] }
tokio = { version = "1.48", features = ["macros", "net", "rt-multi-thread", "signal", "time"] }
tracedb-features = { path = "../tracedb/crates/tracedb-features" }
tracedb-query = { path = "../tracedb/crates/tracedb-query" }

[dev-dependencies]
tempfile = "3.10"
tracedb-query = { path = "../tracedb/crates/tracedb-query" }
tracedb-server = { path = "../tracedb/crates/tracedb-server" }
