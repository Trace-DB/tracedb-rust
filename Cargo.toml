[package]
name = "trace_db_api"
version = "0.1.1"
edition = "2021"
description = "Rust SDK for trace_db_api generated by Fern"
license = "MIT"
repository = "https://github.com/fern-api/fern"
documentation = "https://docs.rs/trace_db_api"

[lib]
doctest = false

[dependencies]
bytes = "1.0"
futures = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }

[dev-dependencies]
tokio-test = "0.4"

