version: 2.1

jobs:
  tracedb-rust:
    docker:
      - image: cimg/rust:1.89
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-v1-{{ checksum "Cargo.toml" }}
            - cargo-v1-
      - run:
          name: Formatting
          command: cargo fmt --all -- --check
      - run:
          name: Check
          command: cargo check --all-targets --all-features
      - run:
          name: Test
          command: cargo test --all-targets --all-features
      - run:
          name: Clippy
          command: cargo clippy --all-targets --all-features -- -D warnings
      - run:
          name: Docs
          command: cargo doc --no-deps --all-features
          environment:
            RUSTDOCFLAGS: "-D warnings"
      - run:
          name: Cargo deny
          command: |
            cargo install cargo-deny --version 0.19.8 --locked
            cargo deny check
      - run:
          name: Package dry run
          command: cargo package --locked
      - save_cache:
          key: cargo-v1-{{ checksum "Cargo.toml" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - target

workflows:
  ci:
    jobs:
      - tracedb-rust:
          name: circleci/tracedb-rust
          filters:
            tags:
              only: /^v.*/
